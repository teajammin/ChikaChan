<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ChikaChan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      background: #151f2e;
      color: #e0d7f5;
      font-family: "Segoe UI", sans-serif;
      font-size: 13px;
      line-height: 1.6;
      overflow: hidden;
    }
    .ck-header {
      background: #1c2a3a;
      border-bottom: 2px solid #3a6ab8;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 11px;
    }
    .ck-header img { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #3a6ab8; }
    .ck-header h1  { font-size: 15px; font-weight: 700; color: #fff; }
    .ck-header p   { font-size: 11px; color: #8ea0b8; margin: 0; }

    .ck-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(58,106,184,0.15);
      border: 1px solid rgba(58,106,184,0.3);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 700;
      color: #6a9fd8;
      margin: 12px 16px;
    }
    .ck-badge::before { content: "●"; color: #4caf50; font-size: 8px; }

    .ck-body { padding: 0 16px 16px; }
    .ck-body p { color: #8ea0b8; font-size: 12px; margin-bottom: 11px; }
    .ck-tip {
      background: rgba(58,106,184,0.1);
      border-left: 3px solid #3a6ab8;
      border-radius: 0 7px 7px 0;
      padding: 9px 11px;
      font-size: 12px;
      color: #a8c0d8;
    }
    a { color: #4a90d8; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="ck-header">
    <img src="icons/icon48.png" alt="ChikaChan" />
    <div>
      <h1>ChikaChan</h1>
      <p>Anime Recommendation AI</p>
    </div>
  </div>

  <div class="ck-badge">Active on MyAnimeList</div>

  <div class="ck-body">
    <p>Head to <a href="https://myanimelist.net" target="_blank">myanimelist.net</a> and open your anime list — ChikaChan appears as a tab on the right side of the page.</p>
    <div class="ck-tip">
      For best results, visit your <strong>anime list page</strong> so Chika can read your scores and make personalised picks.
    </div>
  </div>
</body>
</html>
