<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ChikaChan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      background: #151f2e;
      color: #e0d7f5;
      font-family: "Segoe UI", sans-serif;
      font-size: 13px;
      line-height: 1.6;
      overflow: hidden;
    }
    .ck-header {
      background: #1c2a3a;
      border-bottom: 2px solid #3a6ab8;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 11px;
    }
    .ck-header img { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #3a6ab8; }
    .ck-header h1  { font-size: 15px; font-weight: 700; color: #fff; }
    .ck-header p   { font-size: 11px; color: #8ea0b8; margin: 0; }

    .ck-sites {
      display: flex;
      gap: 8px;
      margin: 12px 16px;
    }
    .ck-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 700;
      flex: 1;
      justify-content: center;
    }
    .ck-badge::before { content: "●"; font-size: 8px; }
    .ck-badge-mal {
      background: rgba(58,106,184,0.15);
      border: 1px solid rgba(58,106,184,0.35);
      color: #6a9fd8;
    }
    .ck-badge-mal::before { color: #4caf50; }
    .ck-badge-cr {
      background: rgba(244,117,33,0.12);
      border: 1px solid rgba(244,117,33,0.35);
      color: #f47521;
    }
    .ck-badge-cr::before { color: #4caf50; }

    .ck-body { padding: 0 16px 16px; }
    .ck-body p { color: #8ea0b8; font-size: 12px; margin-bottom: 11px; }
    .ck-tip {
      background: rgba(58,106,184,0.1);
      border-left: 3px solid #3a6ab8;
      border-radius: 0 7px 7px 0;
      padding: 9px 11px;
      font-size: 12px;
      color: #a8c0d8;
    }
    a { color: #4a90d8; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="ck-header">
    <img src="icons/icon48.png" alt="ChikaChan" />
    <div>
      <h1>ChikaChan</h1>
      <p>Anime Recommendation AI</p>
    </div>
  </div>

  <div class="ck-sites">
    <div class="ck-badge ck-badge-mal">MyAnimeList</div>
    <div class="ck-badge ck-badge-cr">Crunchyroll</div>
  </div>

  <div class="ck-body">
    <p>Head to <a href="https://myanimelist.net" target="_blank">myanimelist.net</a> or <a href="https://www.crunchyroll.com" target="_blank">crunchyroll.com</a> — ChikaChan appears as a tab on the right side of the page.</p>
    <div class="ck-tip">
      For best results, make sure you're <strong>logged in</strong> so Chika can read your history and make personalised picks.
    </div>
  </div>
</body>
</html>
