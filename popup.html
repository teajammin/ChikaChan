<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ChikaChan Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      padding: 20px;
      background: #1a1a2e;
      color: #e0d7f5;
      font-family: "Segoe UI", sans-serif;
      font-size: 14px;
    }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .header img { width: 36px; height: 36px; border-radius: 50%; }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header p  { font-size: 11px; color: #a89ec4; }
    label {
      display: block; font-size: 12px; font-weight: 600;
      color: #a89ec4; text-transform: uppercase;
      letter-spacing: 0.8px; margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; color: #e0d7f5;
      padding: 9px 12px; font-size: 13px;
      outline: none; transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #e85d9c; }
    input[type="password"]::placeholder { color: #6e6585; }
    .save-btn {
      width: 100%; margin-top: 12px; padding: 10px;
      background: linear-gradient(135deg, #e85d9c, #9b5de5);
      border: none; border-radius: 8px; color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s;
    }
    .save-btn:hover { opacity: 0.88; }
    #status { margin-top: 10px; font-size: 12px; text-align: center; min-height: 16px; color: #6bcb77; }
    .hint { margin-top: 14px; font-size: 11px; color: #6e6585; line-height: 1.5; }
    .hint a { color: #e85d9c; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="ChikaChan" />
    <div>
      <h1>ChikaChan ✨</h1>
      <p>Anime Recommendation AI</p>
    </div>
  </div>

  <label for="apiKey">Anthropic API Key</label>
  <input type="password" id="apiKey" placeholder="sk-ant-…" />
  <button class="save-btn" id="saveBtn">Save Key</button>
  <div id="status"></div>

  <p class="hint">
    Your key is stored locally and never shared.<br/>
    Get one at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>.
  </p>

  <script src="popup.js"></script>
</body>
</html>
