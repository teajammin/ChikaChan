<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ChikaChan for Crunchyroll</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      background: #141519;
      color: #e0e0e0;
      font-family: "Segoe UI", sans-serif;
      font-size: 13px;
      line-height: 1.6;
      overflow: hidden;
    }
    .ck-header {
      background: #1c1d23;
      border-bottom: 2px solid #f47521;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 11px;
    }
    .ck-header img { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #f47521; }
    .ck-header h1  { font-size: 15px; font-weight: 700; color: #fff; }
    .ck-header p   { font-size: 11px; color: #9098a0; margin: 0; }

    .ck-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(244,117,33,0.12);
      border: 1px solid rgba(244,117,33,0.3);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 700;
      color: #f47521;
      margin: 12px 16px;
    }
    .ck-badge::before { content: "●"; color: #4caf50; font-size: 8px; }

    .ck-body { padding: 0 16px 16px; }
    .ck-body p { color: #9098a0; font-size: 12px; margin-bottom: 11px; }
    .ck-tip {
      background: rgba(244,117,33,0.08);
      border-left: 3px solid #f47521;
      border-radius: 0 7px 7px 0;
      padding: 9px 11px;
      font-size: 12px;
      color: #c0a898;
    }
    a { color: #f47521; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="ck-header">
    <img src="icons/icon48.png" alt="ChikaChan" />
    <div>
      <h1>ChikaChan</h1>
      <p>Anime Recommendation AI</p>
    </div>
  </div>

  <div class="ck-badge">Active on Crunchyroll</div>

  <div class="ck-body">
    <p>Head to <a href="https://www.crunchyroll.com" target="_blank">crunchyroll.com</a> while logged in — ChikaChan appears as a tab on the right side of the page.</p>
    <div class="ck-tip">
      For best results, make sure you're <strong>logged in</strong> so Chika can read your watch history and make personalised picks.
    </div>
  </div>
</body>
</html>
